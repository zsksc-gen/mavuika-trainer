<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Open Graph / Discord Embed Meta Tags -->
        <title>Mavuika Combo Trainer</title>
        <meta name="title" content="Mavuika Combo Trainer" />
        <meta name="description" content="Interactive trainer for Mavuika" />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Mavuika Combo Trainer" />
        <meta
            property="og:description"
            content="Interactive trainer for Mavuika"
        />
        <meta property="og:image" content="/assets/logo.png" />
        <link rel="shortcut icon" href="/assets/logo.png" type="image/png" />
        <meta name="theme-color" content="#d23b1f" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script
            src="https://unpkg.com/react@18.3.1/umd/react.development.js"
            integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
            integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
            integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
            crossorigin="anonymous"
        ></script>
        <style>
            :root {
                /* Clean minimalist canvas - pure white background, dark ink details */
                --bg-primary: #ffffff;
                --bg-secondary: #fafafa;
                --bg-card: #ffffff;
                --text-primary: #1a1a1a;
                --text-secondary: #5a5a5a;
                --text-muted: #a0a0a0;
                --accent-indigo: #1a1a1a; /* structural ink (needle, ticks, text) */
                --accent-gold: #1a1a1a;
                --accent-gold-light: #555;
                --border-light: #e4e4e4;
                --border-subtle: #f0f0f0;
                --severity-critical: #d23b1f; /* finisher / redline */
                --severity-high: #d23b1f; /* charge */
                --severity-medium: #888;
                --severity-low: #2e7d4f;
                --status-online: #2e7d4f;
                --status-offline: #d23b1f;
                --font-display: "Oswald", "Arial Narrow", sans-serif;
                --font-body:
                    "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body,
            #root {
                height: 100%;
                width: 100%;
            }
            body {
                font-family: var(--font-body);
                font-size: 14px;
                color: var(--text-primary);
                background: var(--bg-primary);
                -webkit-font-smoothing: antialiased;
                overflow-y: auto;
            }
            h1,
            h2,
            h3 {
                font-family: var(--font-display);
                font-weight: 600;
                letter-spacing: 0.01em;
            }
            ::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }
            ::-webkit-scrollbar-track {
                background: var(--bg-secondary);
            }
            ::-webkit-scrollbar-thumb {
                background: var(--border-light);
                border-radius: 0;
            }
            .stage-focus:focus {
                outline: none;
            }
            /* YouTube Responsive Wrapper */
            .yt-embed-wrapper {
                position: relative;
                padding-bottom: 56.25%; /* 16:9 ratio */
                height: 0;
                overflow: hidden;
                margin: 16px 0;
                border-radius: 8px;
                border: 1px solid var(--border-light);
            }
            .yt-embed-wrapper iframe {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
            /* Island Markdown Typography */
            .island-markdown-content h1,
            .island-markdown-content h2,
            .island-markdown-content h3 {
                font-family: var(--font-display);
                color: var(--text-primary);
                margin: 20px 0 10px;
                font-weight: 600;
                letter-spacing: 0.02em;
            }
            .island-markdown-content h1 { font-size: 20px; border-bottom: 1px solid var(--border-light); padding-bottom: 8px; }
            .island-markdown-content h2 { font-size: 16px; }
            .island-markdown-content h3 { font-size: 14px; }
            .island-markdown-content p { margin-bottom: 12px; }
            .island-markdown-content a { color: #0969da; text-decoration: none; font-weight: 500; }
            .island-markdown-content a:hover { text-decoration: underline; }
            .island-markdown-content ul {
                list-style-type: disc;
                padding-left: 20px;
                margin-bottom: 12px;
            }
            .island-markdown-content ol {
                list-style-type: decimal;
                padding-left: 20px;
                margin-bottom: 12px;
            }
            .island-markdown-content li {
                margin-bottom: 6px;
                display: list-item;
            }
            .island-markdown-content code {
                background: var(--bg-secondary);
                border: 1px solid var(--border-light);
                padding: 2px 5px;
                border-radius: 4px;
                font-family: monospace;
                font-size: 12px;
                color: var(--text-primary);
            }
            .island-markdown-content pre {
                background: var(--bg-secondary);
                padding: 12px;
                border-radius: 8px;
                overflow-x: auto;
                border: 1px solid var(--border-light);
                margin-bottom: 12px;
            }
            .island-markdown-content pre code {
                background: transparent;
                border: none;
                padding: 0;
            }
            .island-markdown-content hr {
                border: 0;
                border-top: 1px solid var(--border-light);
                margin: 16px 0;
            }
        </style>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    </head>
    <body>
        <div id="root"></div>
        <script src="trainer-config.js"></script>
        <script type="text/babel" src="dynamic-island.jsx"></script>
        <script type="text/babel" src="trainer-core.jsx"></script>
        <script type="text/babel" src="trainer.jsx"></script>
        <script type="text/babel" src="trainer-app.jsx"></script>
    </body>
</html>
